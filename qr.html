<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스펀지 바이블 QR코드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
      background: #f0f9ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 40px 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 340px;
      width: 90%;
    }
    .logo { width: clamp(100px, 40vw, 160px); height: auto; }
    h1 {
      font-size: 20px;
      font-weight: 800;
      color: #1e40af;
      text-align: center;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 12px;
      border: 6px solid #eff6ff;
    }
    .url {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      word-break: break-all;
    }
    .btn-print {
      margin-top: 4px;
      padding: 10px 28px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-print:hover { background: #1d4ed8; }
    @media print {
      body { background: #fff; }
      .btn-print { display: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/logo.png" alt="스펀지 바이블 로고">
    <h1>스펀지 바이블<br>성경 암송</h1>
    <div id="qrcode"></div>
    <p class="url">https://jxlove2020.github.io/sponge-bible/</p>
    <button class="btn-print" onclick="window.print()">🖨 인쇄하기</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://jxlove2020.github.io/sponge-bible/',
      width: 220,
      height: 220,
      colorDark: '#1e40af',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H,
    });
  </script>
</body>
</html>
