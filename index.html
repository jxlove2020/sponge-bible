<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="theme-color" content="#5b8fba" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="스펀지 바이블" />
    <link rel="icon" href="assets/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/icon.png" />
    <link rel="manifest" href="manifest.json" />
    <title>스펀지 바이블</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- 헤더 -->
    <header class="header">
      <div class="header-main">
        <div class="header-left">스펀지 바이블</div>
        <div class="header-center">
          <img src="assets/logo.png" alt="스펀지 바이블 로고" />
        </div>
        <div class="header-right">
          <button class="font-btn" id="fdn" title="글자 작게">가−</button>
          <button class="font-btn" id="fup" title="글자 크게">가+</button>
        </div>
      </div>
    </header>

    <!-- 로딩 -->
    <div id="loading">📖 성경 데이터 불러오는 중…</div>

    <!-- 앱 본문 -->
    <div id="app" style="display: none">
      <!-- 컨트롤 바 -->
      <div class="ctrl-wrap">
        <div class="ctrl-bar">
          <!-- 1행: 단계 버튼 -->
          <div class="stage-row">
            <button class="stage-btn on" data-s="0">전체 보기</button>
            <button class="stage-btn" data-s="1" title="명사 가리기">1단계</button>
            <button class="stage-btn" data-s="2" title="어구 가리기">2단계</button>
            <button class="stage-btn" data-s="3" title="전체 가리기">3단계</button>
          </div>
          <!-- 2행: 전체 공개 + 슬라이더 + 진행률 -->
          <div class="ctrl-foot">
            <button class="reveal-btn" id="reveal-all">🫣 전체 공개</button>
            <input type="range" id="verse-slider" min="1" max="100" value="1" />
            <div class="ctrl-info">
              <span id="slider-label">1/100</span>
              <span class="progress" id="progress">완료 0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 구절 목록 -->
      <div class="verse-wrap">
        <ol class="verse-bg" id="verse-list"></ol>
      </div>
    </div>

    <!-- JS: 의존 순서대로 로드 -->
    <script src="js/masking.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
          .then(reg => {
            reg.update(); // 페이지 로드마다 즉시 업데이트 확인
            const activate = sw => {
              sw.addEventListener('statechange', () => {
                if (sw.state === 'activated') window.location.reload();
              });
            };
            if (reg.installing) activate(reg.installing);
            if (reg.waiting)    reg.waiting.postMessage('skip-waiting');
            reg.addEventListener('updatefound', () => {
              activate(reg.installing);
            });
          });
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data === 'sw-updated') window.location.reload();
        });
      }
    </script>
  </body>
</html>
